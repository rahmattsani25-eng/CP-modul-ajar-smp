<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Prompt Modul Ajar (Versi Ultimate Final)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .form-group { margin-bottom: 20px; }
        label.title { font-weight: bold; display: block; margin-bottom: 8px; color: #2c3e50; }
        input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        
        /* Gaya khusus untuk Checkbox */
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 5px; border: 1px solid #ddd; }
        .checkbox-group label { font-weight: normal; display: flex; align-items: center; cursor: pointer; font-size: 14px; }
        .checkbox-group input { margin-right: 10px; cursor: pointer; }

        button { background-color: #3498db; color: white; border: none; padding: 12px 20px; cursor: pointer; border-radius: 5px; font-size: 16px; width: 100%; margin-top: 15px; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        
        .result-box { margin-top: 25px; display: none; }
        textarea { width: 100%; height: 480px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: monospace; resize: vertical; background-color: #2c3e50; color: #ecf0f1; font-size: 14px; line-height: 1.5; }
        .btn-copy { background-color: #27ae60; margin-top: 10px; }
        .btn-copy:hover { background-color: #2ecc71; }
        .badge { display: block; width: max-content; margin: 10px auto 25px auto; padding: 5px 15px; background: #e74c3c; color: white; border-radius: 20px; font-size: 13px; font-weight: bold; }
        
        /* Gaya untuk Credit Developer */
        .credit { text-align: center; margin-top: 35px; padding-top: 15px; border-top: 1px solid #eee; font-size: 14px; color: #7f8c8d; }
        .credit strong { color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h2>Pembuat Prompt Modul Ajar</h2>
    <span class="badge">Versi Ultimate Final (Full Otomatis)</span>
    
    <!-- Input Identitas Penyusun -->
    <div class="form-group">
        <label class="title" for="penyusun">Nama Penyusun:</label>
        <input type="text" id="penyusun" placeholder="Contoh: Rahmat Gufron Tsani, S.Pd.,MCE">
    </div>

    <div class="form-group">
        <label class="title" for="sekolah">Nama Sekolah:</label>
        <input type="text" id="sekolah" placeholder="Contoh: SMP Negeri 1 Nusantara">
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">

    <div class="form-group">
        <label class="title" for="mapel">Mata Pelajaran:</label>
        <input type="text" id="mapel" placeholder="Contoh: Ilmu Pengetahuan Sosial (IPS)">
    </div>
    
    <!-- Fase / Kelas diubah menjadi Dropdown -->
    <div class="form-group">
        <label class="title" for="fase">Fase / Kelas:</label>
        <select id="fase">
            <option value="Fase A / Kelas 1 SD">Fase A / Kelas 1 SD</option>
            <option value="Fase A / Kelas 2 SD">Fase A / Kelas 2 SD</option>
            <option value="Fase B / Kelas 3 SD">Fase B / Kelas 3 SD</option>
            <option value="Fase B / Kelas 4 SD">Fase B / Kelas 4 SD</option>
            <option value="Fase C / Kelas 5 SD">Fase C / Kelas 5 SD</option>
            <option value="Fase C / Kelas 6 SD">Fase C / Kelas 6 SD</option>
            <option value="Fase D / Kelas 7 SMP">Fase D / Kelas 7 SMP</option>
            <option value="Fase D / Kelas 8 SMP">Fase D / Kelas 8 SMP</option>
            <option value="Fase D / Kelas 9 SMP">Fase D / Kelas 9 SMP</option>
            <option value="Fase E / Kelas 10 SMA/SMK">Fase E / Kelas 10 SMA/SMK</option>
            <option value="Fase F / Kelas 11 SMA/SMK">Fase F / Kelas 11 SMA/SMK</option>
            <option value="Fase F / Kelas 12 SMA/SMK">Fase F / Kelas 12 SMA/SMK</option>
        </select>
    </div>
    
    <div class="form-group">
        <label class="title" for="elemen">Elemen Capaian Pembelajaran (CP):</label>
        <input type="text" id="elemen" placeholder="Contoh: Pemahaman Sosial / Keterampilan Proses">
    </div>
    
    <div class="form-group">
        <label class="title" for="topik">Bab / Topik Materi:</label>
        <input type="text" id="topik" placeholder="Contoh: Interaksi Keruangan dalam Kehidupan di Negara ASEAN">
    </div>
    
    <div class="form-group">
        <label class="title" for="waktu">Alokasi Waktu:</label>
        <select id="waktu">
            <option value="2 JP x 35 Menit (SD)">2 JP x 35 Menit (SD)</option>
            <option value="3 JP x 35 Menit (SD)">3 JP x 35 Menit (SD)</option>
            <option value="2 JP x 40 Menit (SMP)">2 JP x 40 Menit (SMP)</option>
            <option value="3 JP x 40 Menit (SMP)">3 JP x 40 Menit (SMP)</option>
            <option value="2 JP x 45 Menit (SMA/SMK)">2 JP x 45 Menit (SMA/SMK)</option>
            <option value="3 JP x 45 Menit (SMA/SMK)">3 JP x 45 Menit (SMA/SMK)</option>
        </select>
    </div>
    
    <div class="form-group">
        <label class="title">Dimensi Profil Lulusan (Profil Pelajar Pancasila):</label>
        <div class="checkbox-group">
            <label><input type="checkbox" value="Beriman, Bertakwa kepada Tuhan YME, dan Berakhlak Mulia"> Beriman & Bertakwa</label>
            <label><input type="checkbox" value="Berkebinekaan Global"> Berkebinekaan Global</label>
            <label><input type="checkbox" value="Bergotong Royong"> Bergotong Royong</label>
            <label><input type="checkbox" value="Mandiri"> Mandiri</label>
            <label><input type="checkbox" value="Bernalar Kritis"> Bernalar Kritis</label>
            <label><input type="checkbox" value="Kreatif"> Kreatif</label>
        </div>
    </div>
    
    <div class="form-group">
        <label class="title" for="pendekatan">Pendekatan Pembelajaran:</label>
        <select id="pendekatan">
            <option value="Deep Learning (Pembelajaran Mendalam & Bermakna)">Deep Learning (Pembelajaran Mendalam)</option>
            <option value="Teaching at the Right Level (TaRL)">Teaching at the Right Level (TaRL)</option>
            <option value="Culturally Responsive Teaching (CRT)">Culturally Responsive Teaching (CRT)</option>
            <option value="Technological Pedagogical Content Knowledge (TPACK)">TPACK (Integrasi Teknologi)</option>
            <option value="Pendekatan Saintifik">Pendekatan Saintifik (5M)</option>
        </select>
    </div>

    <div class="form-group">
        <label class="title" for="model">Model Pembelajaran:</label>
        <select id="model">
            <option value="Problem Based Learning (PBL)">Problem Based Learning (PBL)</option>
            <option value="Project Based Learning (PjBL)">Project Based Learning (PjBL)</option>
            <option value="Discovery Learning">Discovery Learning</option>
            <option value="Inquiry Learning">Inquiry Learning</option>
            <option value="Jigsaw (Kooperatif)">Jigsaw (Kooperatif)</option>
            <option value="Think-Pair-Share (Kooperatif)">Think-Pair-Share (Kooperatif)</option>
        </select>
    </div>

    <button onclick="generatePrompt()">Buat Prompt Modul Ajar</button>

    <div class="result-box" id="resultBox">
        <label class="title">Hasil Prompt (Salin teks ini dan tempel ke AI):</label>
        <textarea id="promptOutput" readonly></textarea>
        <button class="btn-copy" onclick="copyPrompt()">Salin Prompt</button>
    </div>

    <!-- Credit Developer -->
    <div class="credit">
        Dikembangkan oleh: <br> <strong>Rahmat Gufron Tsani, S.Pd.,MCE</strong>
    </div>

</div>

<script>
    function generatePrompt() {
        const penyusun = document.getElementById('penyusun').value || "[Nama Penyusun]";
        const sekolah = document.getElementById('sekolah').value || "[Nama Sekolah]";
        const mapel = document.getElementById('mapel').value || "[Mata Pelajaran]";
        const fase = document.getElementById('fase').value; // Mengambil dari dropdown
        const elemen = document.getElementById('elemen').value || "[Elemen CP]";
        const topik = document.getElementById('topik').value || "[Bab / Topik Materi]";
        const waktu = document.getElementById('waktu').value;
        const pendekatan = document.getElementById('pendekatan').value;
        const model = document.getElementById('model').value;
        
        const profilCheckboxes = document.querySelectorAll('.checkbox-group input[type="checkbox"]:checked');
        let profilArray = [];
        profilCheckboxes.forEach((cb) => profilArray.push(cb.value));
        const profil = profilArray.length > 0 ? profilArray.join(', ') : "[Dimensi Profil Lulusan]";
        
        const promptText = `Bertindaklah sebagai Ahli Kurikulum dan Pendidik Berpengalaman di Indonesia yang sangat menguasai revisi terbaru Kurikulum Merdeka. Buatkan Modul Ajar komprehensif, interaktif, dan terstruktur berdasarkan:

* Nama Penyusun: ${penyusun}
* Nama Sekolah: ${sekolah}
* Mata Pelajaran: ${mapel}
* Fase / Kelas: ${fase}
* Elemen CP: ${elemen}
* Bab / Topik Materi: ${topik}
* Alokasi Waktu: ${waktu}
* Dimensi Profil Lulusan (Pelajar Pancasila): ${profil}
* Pendekatan Pembelajaran: ${pendekatan}
* Model Pembelajaran: ${model}

Susun Modul Ajar ini dengan panduan struktur terbaru berikut:

1. INFORMASI UMUM: Identitas Modul (Sertakan secara eksplisit Nama Penyusun dan Nama Sekolah), Kompetensi Awal, Dimensi Profil Lulusan, Media Pembelajaran, Sumber Belajar (Bahan bacaan), Sarpras, Target Peserta Didik.
2. KOMPONEN INTI: 
   - Tujuan Pembelajaran (sesuai elemen CP).
   - Kriteria Ketercapaian Tujuan Pembelajaran (KKTP).
   - Pemahaman Bermakna & Pertanyaan Pemantik.
   - Kegiatan Pembelajaran (Pendahuluan, Inti, Penutup). 
     [PENTING]: Pastikan kegiatan inti diaplikasikan secara terpadu menggunakan pendekatan **${pendekatan}** dan sintaks model **${model}**. Berikan instruksi yang mendorong penalaran tingkat tinggi (HOTS) serta cantumkan catatan singkat di mana diferensiasi (proses/konten/produk) dilakukan.
   - Refleksi Guru dan Peserta Didik (Buatkan daftar pertanyaannya secara eksplisit).
3. ASESMEN: Diagnostik, Formatif, dan Sumatif (Sertakan format Rubrik Penilaian sederhana dalam bentuk tabel).
4. PENGAYAAN DAN REMEDIAL.
5. LAMPIRAN: Ringkasan Materi, 3 soal LKPD yang memancing critical thinking, Glosarium, dan Daftar Pustaka.

Tuliskan menggunakan format rapi (bold, bullet points, heading) agar langsung siap cetak. (Prompt ini dikembangkan oleh Rahmat Gufron Tsani, S.Pd.,MCE)`;

        document.getElementById('promptOutput').value = promptText;
        document.getElementById('resultBox').style.display = 'block';
    }

    function copyPrompt() {
        const copyText = document.getElementById('promptOutput');
        copyText.select();
        copyText.setSelectionRange(0, 99999); 
        navigator.clipboard.writeText(copyText.value).then(() => {
            alert("Prompt karya Rahmat Gufron Tsani berhasil disalin! Silakan paste di AI.");
        });
    }
</script>

</body>
</html>
